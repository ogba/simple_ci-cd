name: CI/CD

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate HTML syntax
        run: |
          python - <<'PY'
          from html.parser import HTMLParser
          parser = HTMLParser()
          with open('index.html', encoding='utf-8') as fh:
              parser.feed(fh.read())
          print('HTML parsed successfully')
          PY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:latest
          file: Dockerfile

  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run container and verify service
        run: |
          docker run -d --name ai-arcade-snake-test -p 8099:8099 ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:latest
          sleep 5
          curl --fail http://localhost:8099
          docker stop ai-arcade-snake-test
          docker rm ai-arcade-snake-test

  deploy:
    needs: smoke-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to target host
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            if [ -n "$GHCR_TOKEN" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io --username "${{ github.repository_owner }}" --password-stdin
            fi
            docker pull ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:latest
            docker rm -f ai-arcade-snake-service || true
            docker run -d --name ai-arcade-snake-service -p 8099:8099 --restart unless-stopped ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:latest
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
