name: CI/CD

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate HTML syntax
        run: |
          python - <<'PY'
          from html.parser import HTMLParser
          parser = HTMLParser()
          with open('index.html', encoding='utf-8') as fh:
              parser.feed(fh.read())
          print('HTML parsed successfully')
          PY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:latest
          file: Dockerfile

  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run container and verify service
        run: |
          docker run -d --name ai-arcade-snake-test -p 8099:8099 ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:latest
          sleep 5
          curl --fail http://localhost:8099
          docker stop ai-arcade-snake-test
          docker rm ai-arcade-snake-test

  deploy:
    needs: smoke-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Verify Tailscale connectivity
        run: |
          echo "=== Tailscale status ==="
          tailscale status
          echo "=== Pinging DEPLOY_HOST ==="
          ping -c 3 ${{ secrets.DEPLOY_HOST }} || echo "Ping failed"
          echo "=== TCP check on SSH port ==="
          nc -zv -w 5 ${{ secrets.DEPLOY_HOST }} ${{ secrets.DEPLOY_PORT }} || echo "TCP connect failed"

      - name: Deploy to target host
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            if [ -n "$GHCR_TOKEN" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io --username "${{ github.repository_owner }}" --password-stdin
            fi
            docker pull ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:latest
            docker rm -f ai-arcade-snake-service || true
            docker run -d --name ai-arcade-snake-service -p 8099:8099 --restart unless-stopped ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:latest
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
