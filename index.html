<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Snake</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100dvh;
      overflow: hidden;
      background: #060a12;
      color: #f0f6ff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 16px;
      width: 100%;
      max-width: 560px;
    }

    /* ── Header ── */
    header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .title {
      font-size: 1.9rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.35em;
      color: #00ffcc;
      text-shadow: 0 0 24px rgba(0,255,204,.65);
    }

    .stats { display: flex; gap: 22px; }

    .stat { text-align: center; }

    .stat-label {
      display: block;
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: rgba(140,190,255,.55);
      margin-bottom: 3px;
    }

    .stat-value {
      font-size: 1.45rem;
      font-weight: 700;
      color: #fff;
      transition: color .2s;
    }

    .stat-value.accent {
      color: #00ffcc;
      text-shadow: 0 0 10px rgba(0,255,204,.5);
    }

    /* ── Canvas shell ── */
    .shell {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      box-shadow:
        0 0 0 2px rgba(0,255,204,.25),
        0 0 50px rgba(0,255,204,.08),
        inset 0 0 30px rgba(0,0,0,.6);
    }

    canvas { display: block; }

    /* ── Overlays ── */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: rgba(4, 8, 18, .86);
      backdrop-filter: blur(6px);
    }
    .overlay.off { display: none; }

    .ov-title {
      font-size: 2.6rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .22em;
      color: #00ffcc;
      text-shadow: 0 0 36px rgba(0,255,204,.7);
    }

    .ov-sub {
      font-size: .9rem;
      color: rgba(200,220,255,.7);
      text-align: center;
      line-height: 1.6;
    }
    .ov-sub strong { color: #fff; font-weight: 700; }

    .ov-score {
      font-size: 1.05rem;
      color: rgba(200,220,255,.8);
    }
    .ov-score span { color: #fff; font-weight: 700; }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 14px;
      background: rgba(255,77,255,.1);
      border: 1px solid rgba(255,77,255,.3);
      border-radius: 999px;
      font-size: .72rem;
      color: #ff77ff;
      text-transform: uppercase;
      letter-spacing: .14em;
    }

    .btn {
      padding: 11px 30px;
      background: transparent;
      border: 2px solid #00ffcc;
      border-radius: 999px;
      color: #00ffcc;
      font-size: .85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .2em;
      cursor: pointer;
      transition: all .18s;
      box-shadow: 0 0 18px rgba(0,255,204,.18);
    }
    .btn:hover, .btn:focus-visible {
      background: rgba(0,255,204,.14);
      box-shadow: 0 0 28px rgba(0,255,204,.38);
      outline: none;
    }

    .new-best {
      color: #ffd700;
      font-size: .9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .16em;
      text-shadow: 0 0 14px rgba(255,215,0,.6);
      animation: blink 0.75s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }

    /* Level bar */
    .level-bar-wrap {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,.06);
      border-radius: 99px;
      overflow: hidden;
    }
    .level-bar {
      height: 100%;
      background: linear-gradient(90deg, #00ffcc, #ff33cc);
      border-radius: 99px;
      transition: width .35s ease;
      box-shadow: 0 0 8px rgba(0,255,204,.5);
    }

    /* ── D-pad ── */
    .dpad {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .dpad-row { display: flex; gap: 6px; }

    .dpad-btn {
      width: 52px;
      height: 52px;
      background: rgba(0,255,204,.07);
      border: 1px solid rgba(0,255,204,.22);
      border-radius: 12px;
      color: rgba(0,255,204,.85);
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .1s, transform .1s;
    }
    .dpad-btn:active { background: rgba(0,255,204,.2); transform: scale(.9); }

    .hint {
      font-size: .7rem;
      color: rgba(140,180,255,.35);
      text-transform: uppercase;
      letter-spacing: .12em;
    }

    @media (pointer: coarse) {
      .dpad  { display: flex; }
      .hint  { display: none; }
    }
    @media (max-width: 420px) {
      .title { font-size: 1.4rem; }
      .stat-value { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="title">Snake</div>
    <div class="stats">
      <div class="stat">
        <span class="stat-label">Score</span>
        <span class="stat-value" id="scoreEl">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Best</span>
        <span class="stat-value accent" id="bestEl">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Level</span>
        <span class="stat-value" id="levelEl">1</span>
      </div>
    </div>
  </header>

  <div class="level-bar-wrap" id="levelBarWrap">
    <div class="level-bar" id="levelBar" style="width:0%"></div>
  </div>

  <div class="shell" id="shell">
    <canvas id="c"></canvas>

    <!-- Start -->
    <div class="overlay" id="startOv">
      <div class="ov-title">Snake</div>
      <div class="badge">Neon Edition</div>
      <div class="ov-sub">
        <strong>Arrow keys</strong> or <strong>WASD</strong> to move<br>
        <strong>Space</strong> to pause · <strong>R</strong> to restart
      </div>
      <button class="btn" id="startBtn">Press Space to Play</button>
    </div>

    <!-- Pause -->
    <div class="overlay off" id="pauseOv">
      <div class="ov-title">Paused</div>
      <button class="btn" id="resumeBtn">Resume (Space)</button>
    </div>

    <!-- Game Over -->
    <div class="overlay off" id="overOv">
      <div class="ov-title">Game Over</div>
      <div class="ov-score">Score: <span id="finalScore">0</span></div>
      <div class="new-best off" id="newBestEl">New Best!</div>
      <button class="btn" id="restartBtn">Play Again (R)</button>
    </div>
  </div>

  <div class="dpad">
    <div class="dpad-row"><button class="dpad-btn" id="dUp">▲</button></div>
    <div class="dpad-row">
      <button class="dpad-btn" id="dLeft">◀</button>
      <button class="dpad-btn" id="dDown">▼</button>
      <button class="dpad-btn" id="dRight">▶</button>
    </div>
  </div>

  <div class="hint">Arrow / WASD · Space = pause · R = restart</div>
</div>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────
const COLS         = 20;
const ROWS         = 20;
const BASE_SPEED   = 8;   // ticks/s at level 1
const LVLUP_SPEED  = 2;   // extra ticks/s per level
const SCORE_FOOD   = 10;  // base points per food
const FOODS_LVLUP  = 5;   // foods eaten to level up
const MAX_LEVEL    = 10;
const PARTICLES    = 14;
const LS_KEY       = 'snakeBest_v2';

// ─── Canvas ──────────────────────────────────────────────────────────────────
const canvas  = document.getElementById('c');
const ctx     = canvas.getContext('2d');
const shell   = document.getElementById('shell');

function cell() { return canvas.width / COLS; }

function resize() {
  const max  = Math.min(window.innerWidth - 32, window.innerHeight - 220, 520);
  const size = Math.floor(max / COLS) * COLS;
  canvas.width  = size;
  canvas.height = size;
  shell.style.width  = size + 'px';
  shell.style.height = size + 'px';
}
resize();
window.addEventListener('resize', () => { resize(); if (STATE !== 'playing') render(); });

// ─── State ───────────────────────────────────────────────────────────────────
let STATE = 'idle'; // idle | playing | paused | over
let snake, dir, nextDir, food, parts;
let score, best, level, foodEaten, foodPulse;
let lastTs = 0, tickAcc = 0;

best = Number(localStorage.getItem(LS_KEY) || 0);

// ─── DOM ─────────────────────────────────────────────────────────────────────
const scoreEl    = document.getElementById('scoreEl');
const bestEl     = document.getElementById('bestEl');
const levelEl    = document.getElementById('levelEl');
const levelBar   = document.getElementById('levelBar');
const finalScore = document.getElementById('finalScore');
const newBestEl  = document.getElementById('newBestEl');

const startOv  = document.getElementById('startOv');
const pauseOv  = document.getElementById('pauseOv');
const overOv   = document.getElementById('overOv');

// ─── Audio ───────────────────────────────────────────────────────────────────
let AC;
function ac() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  return AC;
}
function tone(freq, type, dur, vol = 0.14) {
  try {
    const a = ac(), osc = a.createOscillator(), g = a.createGain();
    osc.connect(g); g.connect(a.destination);
    osc.type = type; osc.frequency.value = freq;
    g.gain.setValueAtTime(vol, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    osc.start(); osc.stop(a.currentTime + dur);
  } catch(_) {}
}
const sfxEat  = () => { tone(440,'sine',.07); tone(660,'sine',.1,.1); };
const sfxDie  = () => { tone(160,'sawtooth',.4,.2); tone(100,'sawtooth',.6,.15); };
const sfxLvl  = () => { [523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.12,.1),i*80)); };

// ─── Particles ───────────────────────────────────────────────────────────────
function burst(gx, gy) {
  const C = cell(), cx = gx*C+C/2, cy = gy*C+C/2;
  for (let i = 0; i < PARTICLES; i++) {
    const a = (i/PARTICLES)*Math.PI*2;
    const s = 1.8 + Math.random()*2.8;
    parts.push({
      x: cx, y: cy,
      vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      life: 1,
      fade: .04 + Math.random()*.04,
      r: 2 + Math.random()*3,
      hue: 270 + Math.random()*70,
    });
  }
}

function stepParticles() {
  parts = parts.filter(p => {
    p.x += p.vx; p.y += p.vy;
    p.vx *= .91; p.vy *= .91;
    p.life -= p.fade;
    return p.life > 0;
  });
}

// ─── Game ────────────────────────────────────────────────────────────────────
function init() {
  const mx = Math.floor(COLS/2);
  const my = Math.floor(ROWS/2);
  snake = [{x:mx,y:my},{x:mx-1,y:my},{x:mx-2,y:my}];
  dir = nextDir = {x:1,y:0};
  parts = [];
  score = 0; level = 1; foodEaten = 0;
  tickAcc = 0; foodPulse = 0;
  placeFood();
  updateUI();
}

function placeFood() {
  const free = [];
  for (let x=0;x<COLS;x++) for (let y=0;y<ROWS;y++)
    if (!snake.some(s=>s.x===x&&s.y===y)) free.push({x,y});
  food = free[Math.floor(Math.random()*free.length)];
}

function tick() {
  dir = {...nextDir};
  const head = {x: snake[0].x+dir.x, y: snake[0].y+dir.y};

  if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS
   || snake.some(s=>s.x===head.x&&s.y===head.y)) {
    die(); return;
  }

  snake.unshift(head);

  if (head.x===food.x && head.y===food.y) {
    score += SCORE_FOOD * level;
    foodEaten++;
    if (score > best) {
      best = score;
      localStorage.setItem(LS_KEY, String(best));
    }
    burst(food.x, food.y);
    sfxEat();
    if (foodEaten % FOODS_LVLUP === 0 && level < MAX_LEVEL) { level++; sfxLvl(); }
    placeFood();
  } else {
    snake.pop();
  }
  updateUI();
}

function die() {
  STATE = 'over';
  sfxDie();
  finalScore.textContent = score;
  const isNew = score > 0 && score >= best;
  newBestEl.classList.toggle('off', !isNew);
  overOv.classList.remove('off');
}

function updateUI() {
  scoreEl.textContent = score;
  bestEl.textContent  = best;
  levelEl.textContent = level;
  const progress = ((foodEaten % FOODS_LVLUP) / FOODS_LVLUP) * 100;
  levelBar.style.width = (level >= MAX_LEVEL ? 100 : progress) + '%';
}

// ─── Render ──────────────────────────────────────────────────────────────────
function drawBg() {
  const C = cell();
  ctx.fillStyle = '#020610';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle = 'rgba(0,255,204,.045)';
  ctx.lineWidth = 1;
  for (let i=0;i<=COLS;i++) {
    ctx.beginPath(); ctx.moveTo(i*C,0); ctx.lineTo(i*C,canvas.height); ctx.stroke();
  }
  for (let j=0;j<=ROWS;j++) {
    ctx.beginPath(); ctx.moveTo(0,j*C); ctx.lineTo(canvas.width,j*C); ctx.stroke();
  }
}

function rrect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function lerp(a,b,t){ return a+(b-a)*t; }

function drawSnake() {
  const C = cell();
  const len = snake.length;

  for (let i = len-1; i >= 0; i--) {
    const s = snake[i];
    const t = i / Math.max(len-1,1);
    const r = Math.round(lerp(0, 60, t));
    const g = Math.round(lerp(255, 180, t));
    const b = Math.round(lerp(204, 255, t));
    const a = lerp(1, .45, t);
    const pad = i === 0 ? 2 : lerp(3, 5, t);

    ctx.fillStyle = `rgba(${r},${g},${b},${a})`;

    if (i === 0) {
      ctx.shadowColor = 'rgba(0,255,204,.9)';
      ctx.shadowBlur  = 16;
    }

    rrect(s.x*C+pad, s.y*C+pad, C-pad*2, C-pad*2, i===0 ? 6 : 4);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Eyes on head
  const h = snake[0], C2 = C;
  const cx = h.x*C2+C2/2, cy = h.y*C2+C2/2;
  const off = C2*.18, er = C2*.1;
  let e1, e2;
  if      (dir.x === 1)  { e1={x:cx+off,y:cy-off}; e2={x:cx+off,y:cy+off}; }
  else if (dir.x === -1) { e1={x:cx-off,y:cy-off}; e2={x:cx-off,y:cy+off}; }
  else if (dir.y === -1) { e1={x:cx-off,y:cy-off}; e2={x:cx+off,y:cy-off}; }
  else                   { e1={x:cx-off,y:cy+off}; e2={x:cx+off,y:cy+off}; }
  [e1,e2].forEach(e => {
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(e.x, e.y, er, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(e.x+dir.x*er*.4, e.y+dir.y*er*.4, er*.55, 0, Math.PI*2); ctx.fill();
  });
}

function drawFood() {
  const C = cell();
  const cx = food.x*C+C/2, cy = food.y*C+C/2;
  const pulse = Math.sin(foodPulse)*.14+.86;
  const r = C*.38*pulse;

  ctx.shadowColor = 'rgba(255,50,220,.9)';
  ctx.shadowBlur  = 20;

  const g = ctx.createRadialGradient(cx-r*.3, cy-r*.3, r*.05, cx, cy, r);
  g.addColorStop(0,'#ffaaff');
  g.addColorStop(.5,'#ff33cc');
  g.addColorStop(1,'#8800bb');

  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  ctx.fillStyle = 'rgba(255,255,255,.45)';
  ctx.beginPath(); ctx.arc(cx-r*.28, cy-r*.3, r*.22, 0, Math.PI*2); ctx.fill();
}

function drawParticles() {
  parts.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle   = `hsl(${p.hue},100%,70%)`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r*p.life, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function render() {
  drawBg();
  drawParticles();
  drawFood();
  drawSnake();
}

// ─── Loop ────────────────────────────────────────────────────────────────────
function loop(ts) {
  requestAnimationFrame(loop);

  if (STATE !== 'playing') {
    if (STATE === 'idle' || STATE === 'over') render();
    return;
  }

  const dt = Math.min((ts - (lastTs || ts)) / 1000, .1);
  lastTs = ts;
  tickAcc  += dt;
  foodPulse += dt * 4;

  const speed    = BASE_SPEED + (level-1)*LVLUP_SPEED;
  const interval = 1 / speed;

  while (tickAcc >= interval) {
    tickAcc -= interval;
    tick();
    stepParticles();
    if (STATE !== 'playing') break;
  }
  render();
}

// ─── Input ───────────────────────────────────────────────────────────────────
function move(dx, dy) {
  if (dir.x === -dx && dir.y === -dy) return;
  nextDir = {x:dx, y:dy};
}

document.addEventListener('keydown', e => {
  switch(e.key) {
    case 'ArrowUp':    case 'w': case 'W': e.preventDefault(); move(0,-1);  break;
    case 'ArrowDown':  case 's': case 'S': e.preventDefault(); move(0, 1);  break;
    case 'ArrowLeft':  case 'a': case 'A': e.preventDefault(); move(-1, 0); break;
    case 'ArrowRight': case 'd': case 'D': e.preventDefault(); move( 1, 0); break;
    case ' ':
      e.preventDefault();
      if (STATE==='idle')    startGame();
      else if (STATE==='playing') pause();
      else if (STATE==='paused')  resume();
      break;
    case 'r': case 'R':
      if (STATE==='over'||STATE==='playing') startGame();
      break;
    case 'p': case 'P':
      if (STATE==='playing') pause();
      else if (STATE==='paused') resume();
      break;
  }
});

// Touch swipe
let t0 = null;
canvas.addEventListener('touchstart', e=>{
  t0 = {x:e.touches[0].clientX, y:e.touches[0].clientY};
}, {passive:true});
canvas.addEventListener('touchend', e=>{
  if (!t0) return;
  const dx = e.changedTouches[0].clientX - t0.x;
  const dy = e.changedTouches[0].clientY - t0.y;
  t0 = null;
  if (Math.abs(dx)<10 && Math.abs(dy)<10) {
    if (STATE==='idle') startGame();
    else if (STATE==='playing') pause();
    else if (STATE==='paused') resume();
    return;
  }
  if (STATE !== 'playing') return;
  Math.abs(dx)>Math.abs(dy) ? move(dx>0?1:-1,0) : move(0,dy>0?1:-1);
}, {passive:true});

// D-pad
document.getElementById('dUp').addEventListener('click',    ()=>{ if(STATE==='playing') move(0,-1); });
document.getElementById('dDown').addEventListener('click',  ()=>{ if(STATE==='playing') move(0, 1); });
document.getElementById('dLeft').addEventListener('click',  ()=>{ if(STATE==='playing') move(-1,0); });
document.getElementById('dRight').addEventListener('click', ()=>{ if(STATE==='playing') move( 1,0); });

// Buttons
document.getElementById('startBtn').addEventListener('click',   startGame);
document.getElementById('resumeBtn').addEventListener('click',  resume);
document.getElementById('restartBtn').addEventListener('click', startGame);

// ─── Transitions ─────────────────────────────────────────────────────────────
function startGame() {
  init();
  STATE  = 'playing';
  lastTs = 0;
  startOv.classList.add('off');
  pauseOv.classList.add('off');
  overOv.classList.add('off');
}

function pause() {
  STATE = 'paused';
  pauseOv.classList.remove('off');
}

function resume() {
  STATE  = 'playing';
  lastTs = 0;
  pauseOv.classList.add('off');
}

// ─── Boot ────────────────────────────────────────────────────────────────────
bestEl.textContent = best;
init();
requestAnimationFrame(loop);
</script>
</body>
</html>
